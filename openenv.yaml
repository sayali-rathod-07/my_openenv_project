version: "1.0"
name: "email-triage-env"
entry_point: "src.environment:EmailTriageEnv"

tasks:
  - id: "task_1_new"
    difficulty: "easy"
    grader:
      type: "llm"
      prompt_template: "Score 0 to 1"
  - id: "task_2_billing"
    difficulty: "medium"
    grader:
      type: "llm"
      prompt_template: "Score 0 to 1"
  - id: "task_3_spam"
    difficulty: "hard"
    grader:
      type: "llm"
      prompt_template: "Score 0 to 1"

observation_space:
  type: "dict"
  fields:
    email_id: "string"
    sender: "string"
    subject: "string"
    body: "string"
    current_folder: "string"

action_space:
  type: "dict"
  fields:
    category: "string"
    priority: "string"
    reply_draft: "string"
