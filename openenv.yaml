version: "1.0"
name: "email-triage-test"
entry_point: "src.environment:EmailTriageEnv"

tasks:
  - id: "task_1_easy"
    difficulty: "easy"
    description: "Basic email triage task"
    grader:
      type: "llm"
      prompt_template: "Score the email triage performance 0.0 to 1.0..."

  - id: "task_2_medium"
    difficulty: "medium"
    description: "Intermediate email triage task"
    grader:
      type: "llm"
      prompt_template: "Score the email triage performance 0.0 to 1.0..."

  - id: "task_3_hard"
    difficulty: "hard"
    description: "Complex email triage task"
    grader:
      type: "llm"
      prompt_template: "Score the email triage performance 0.0 to 1.0..."
      
observation_space:
  type: "dict"
  fields:
    email_id: "string"
    sender: "string"
    subject: "string"
    body: "string"
    current_folder: "string"

action_space:
  type: "dict"
  fields:
    category: "string"
    priority: "string"
    reply_draft: "string"
    
