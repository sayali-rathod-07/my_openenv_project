version: "1.0"
name: "email-triage-env"
description: "Real-world email triage task with 3 difficulty levels."
entry_point: "src.environment:EmailTriageEnv"

tasks:
  - id: "task_1_support"
    snippet: |
      from src.environment import EmailTriageEnv
      from src.models import Action
      env = EmailTriageEnv()
      await env.reset()
      # Test Task 1: Support
      action = Action(category="support", priority="high", reply_draft="I will help you with the broken link.")
      res = await env.step(action)
      assert res.reward > 0.5

  - id: "task_2_billing"
    snippet: |
      from src.environment import EmailTriageEnv
      from src.models import Action
      env = EmailTriageEnv()
      await env.reset()
      # Skip to task 2
      await env.step(Action(category="support", priority="high", reply_draft="test draft"))
      # Test Task 2: Billing
      action = Action(category="billing", priority="high", reply_draft="Regarding your overdue invoice.")
      res = await env.step(action)
      assert res.reward > 0.5

  - id: "task_3_spam"
    snippet: |
      from src.environment import EmailTriageEnv
      from src.models import Action
      env = EmailTriageEnv()
      await env.reset()
      # Skip to task 3
      await env.step(Action(category="support", priority="high", reply_draft="test"))
      await env.step(Action(category="billing", priority="high", reply_draft="test"))
      # Test Task 3: Spam
      action = Action(category="spam", priority="low", reply_draft="")
      res = await env.step(action)
      assert res.reward > 0.5

observation_space:
  type: "dict"
  fields:
    email_id: "string"
    sender: "string"
    subject: "string"
    body: "string"
    current_folder: "string"

action_space:
  type: "dict"
  fields:
    category: "string"
    priority: "string"
    reply_draft: "string"