version: "1.0"
name: "email-triage-env"
description: "Real-world email triage task with 3 difficulty levels."
entry_point: "src.environment:EmailTriageEnv"

tasks:
  - id: "task_1_support"
    snippet: |
      from src.environment import EmailTriageEnv
      env = EmailTriageEnv()
      obs = await env.reset()
      assert obs.email_id == "task_1_support"

  - id: "task_2_billing"
    snippet: |
      from src.environment import EmailTriageEnv
      env = EmailTriageEnv()
      await env.reset()
      # Manually advance index to simulate second task for the grader
      env.current_idx = 1
      obs = env._get_obs()
      assert obs.email_id == "task_2_billing"

  - id: "task_3_spam"
    snippet: |
      from src.environment import EmailTriageEnv
      env = EmailTriageEnv()
      await env.reset()
      # Manually advance index to simulate third task for the grader
      env.current_idx = 2
      obs = env._get_obs()
      assert obs.email_id == "task_3_spam"

observation_space:
  type: "dict"
  fields:
    email_id: "string"
    sender: "string"
    subject: "string"
    body: "string"
    current_folder: "string"

action_space:
  type: "dict"
  fields:
    category: "string"
    priority: "string"
    reply_draft: "string"